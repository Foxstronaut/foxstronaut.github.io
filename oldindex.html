<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Web Desktop - Dynamic Apps</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #222;
        color: #fff;
        font-family: sans-serif;
        height: 100%;
        width: 100%;
        overflow: hidden;
    }

    #desktop {
        display: flex;
        height: 100%;
        width: 100%;
    }

    /* Sidebar */
    #sidebar {
        width: 60px;
        background: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 0;
        box-sizing: border-box;
    }

    #sidebar button {
        background: none;
        border: none;
        color: #fff;
        font-size: 24px;
        margin: 10px 0;
        cursor: pointer;
        transition: transform 0.2s;
    }

    #sidebar button:hover {
        transform: scale(1.2);
    }

    /* Main workspace */
    #main {
        flex: 1;
        display: grid;
        width: 100%;
        height: 100%;
        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
    }

    /* App windows */
    .app-window {
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #0ff;
        border-radius: 8px;
        padding: 1rem;
        overflow: auto;
        color: #fff;
        display: flex;
        flex-direction: column;
    }

    .app-window * {
        max-width: 100%;
    }

    .app-window img {
        width: 100%;
        height: auto;
    }

    .app-window h1, .app-window h2, .app-window p {
        margin: 0.5em 0;
    }

    .close-btn {
        align-self: flex-end;
        background: #ff4444;
        border: none;
        color: white;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 4px;
    }

    .close-btn:hover {
        background: #ff0000;
    }
</style>
</head>
<body>
<div id="desktop">
    <div id="sidebar">
        <button onclick="openApp('Notes')">📝</button>
        <button onclick="openApp('Browser')">🌐</button>
        <button onclick="openApp('Gallery')">🖼️</button>
        <button onclick="openApp('Terminal')">💻</button>
    </div>
    <div id="main"></div>
</div>

<script>
let appCount = 0;

function openApp(name) {
    const main = document.getElementById('main');
    const app = document.createElement('div');
    app.className = 'app-window';
    app.dataset.openTime = Date.now();
    app.innerHTML = `
        <button class="close-btn" onclick="closeApp(this)">X</button>
        <h1>${name}</h1>
        <p>Sample content for ${name}.</p>
        <img src="https://via.placeholder.com/400x200?text=${encodeURIComponent(name)}" alt="${name}">
    `;
    main.appendChild(app);
    arrangeWindows();
}

function closeApp(btn) {
    const app = btn.parentElement;
    app.remove();
    arrangeWindows();
}

function arrangeWindows() {
    const main = document.getElementById('main');
    const apps = Array.from(main.children);
    const count = apps.length;

    if (count === 0) {
        main.style.gridTemplateColumns = '';
        main.style.gridTemplateRows = '';
        return;
    }

    if (count === 1) {
        main.style.gridTemplateColumns = '1fr';
        main.style.gridTemplateRows = '1fr';
    } else if (count === 2) {
        main.style.gridTemplateColumns = '1fr 1fr';
        main.style.gridTemplateRows = '1fr';
    } else if (count === 3) {
        // Most recent gets top row
        const mostRecent = apps.sort((a, b) => b.dataset.openTime - a.dataset.openTime)[0];
        apps.forEach(app => {
            app.style.gridColumn = '';
            app.style.gridRow = '';
        });
        main.style.gridTemplateColumns = '1fr 1fr';
        main.style.gridTemplateRows = '2fr 1fr';
        mostRecent.style.gridColumn = '1 / span 2';
        mostRecent.style.gridRow = '1';
    } else {
        const cols = Math.ceil(Math.sqrt(count));
        const rows = Math.ceil(count / cols);
        main.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        main.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        apps.forEach(app => {
            app.style.gridColumn = '';
            app.style.gridRow = '';
        });
    }

    scaleContent(apps);
}

function scaleContent(apps) {
    apps.forEach(app => {
        const rect = app.getBoundingClientRect();
        const baseSize = Math.min(rect.width, rect.height) / 20;
        app.style.fontSize = `${baseSize}px`;
    });
}

window.addEventListener('resize', () => arrangeWindows());
</script>
</body>
</html>
