<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Turquoise OS — Portfolio</title>
<style>
  :root{
    --bg: #0b1014;
    --panel: #11181f;
    --accent: #2bd4c7;
    --text: #e6f1f0;
    --muted: #94a3b8;
    --gap: 14px;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
  .app-shell{ display: grid; grid-template-columns: 280px 1fr; height: 100%; }
  .sidebar{ background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .desktop{ position: relative; height: 100%; padding: var(--gap); overflow: auto; }
  .grid{ display: grid; gap: var(--gap); height: 100%; }
  .window{ background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 8px; display:flex; flex-direction: column; }
  .win-header{ display:flex; align-items:center; justify-content:space-between; padding: 8px; background: rgba(43,212,199,.08); }
  .win-body{ flex:1; padding: 12px; overflow:auto; font-size: 1rem; }
  .win-body img{ max-width: 100%; height: auto; }
  .close{ background:none; border:none; color:var(--text); font-size: 1.2rem; cursor:pointer; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <button onclick="openApp('dashboard')">Dashboard</button>
    <button onclick="openApp('about')">About</button>
    <button onclick="openApp('projects')">Projects</button>
    <button onclick="openApp('contact')">Contact</button>
  </aside>
  <main class="desktop">
    <div class="grid" id="desktopGrid"></div>
  </main>
</div>
<script>
const APPS = {
  dashboard: {title:'Dashboard',content:'<h1>Welcome</h1><p>This is the dashboard.</p>'},
  about: {title:'About',content:'<h1>About Me</h1><p>Some details here.</p>'},
  projects: {title:'Projects',content:'<h1>Projects</h1><p>Project list here.</p>'},
  contact: {title:'Contact',content:'<h1>Contact</h1><p>Email: example@example.com</p>'}
};
let openAppIds = [];
function layoutGrid(){
  const grid = document.getElementById('desktopGrid');
  grid.innerHTML = '';
  const count = openAppIds.length;
  let template = '';
  if(count === 1){ template = '1fr / 1fr'; }
  else if(count === 2){ template = '1fr / 1fr 1fr'; }
  else if(count === 3){ template = '1fr 1fr / 1fr 1fr'; }
  else if(count === 4){ template = '1fr 1fr / 1fr 1fr'; }
  else { template = 'repeat(auto-fill,minmax(300px,1fr)) / repeat(auto-fill,minmax(300px,1fr))'; }
  grid.style.grid = template;
  openAppIds.forEach((id, index) => {
    const app = APPS[id];
    const win = document.createElement('div');
    win.className = 'window';
    let sizeFactor = 1;
    if(count === 1) sizeFactor = 1.4;
    else if(count === 2) sizeFactor = 1.2;
    else sizeFactor = 1;
    win.innerHTML = `<div class="win-header"><span>${app.title}</span><button class="close" onclick="closeApp('${id}')">×</button></div><div class="win-body" style="font-size:${sizeFactor}rem">${app.content}</div>`;
    grid.appendChild(win);
  });
}
function openApp(id){
  const idx = openAppIds.indexOf(id);
  if(idx !== -1) openAppIds.splice(idx,1);
  openAppIds.push(id);
  updateURL();
  layoutGrid();
}
function closeApp(id){
  openAppIds = openAppIds.filter(x=>x!==id);
  updateURL();
  layoutGrid();
}
function updateURL(){
  const params = new URLSearchParams();
  if(openAppIds.length) params.set('apps', openAppIds.join(','));
  history.replaceState(null,'',location.pathname + '?' + params.toString());
}
function init(){
  const params = new URLSearchParams(location.search);
  const apps = params.get('apps');
  if(apps){ openAppIds = apps.split(','); }
  else { openAppIds = ['dashboard']; updateURL(); }
  layoutGrid();
}
init();
</script>
</body>
</html>
